<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
  <title id="title">Flujo de captura e importacion</title>
  <desc id="desc">Diagrama visual del flujo desde chat hasta base de datos, busqueda y exportacion.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#e9f0f6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#17324d" flood-opacity=".14"/>
    </filter>
  </defs>
  <rect width="1120" height="520" rx="0" fill="#f2f6f8"/>
  <path d="M0 414 C190 344 318 468 508 398 C725 318 826 384 1120 292 L1120 520 L0 520 Z" fill="#d7ece4"/>
  <path d="M0 116 C176 176 304 76 472 132 C656 194 772 80 1120 136 L1120 0 L0 0 Z" fill="#dfe9f3"/>
  <g filter="url(#shadow)">
    <rect x="68" y="116" width="208" height="184" rx="8" fill="url(#paper)"/>
    <rect x="327" y="116" width="208" height="184" rx="8" fill="url(#paper)"/>
    <rect x="586" y="116" width="208" height="184" rx="8" fill="url(#paper)"/>
    <rect x="845" y="116" width="208" height="184" rx="8" fill="url(#paper)"/>
  </g>
  <g fill="none" stroke="#2f4858" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <path d="M276 208 H326"/>
    <path d="M535 208 H585"/>
    <path d="M794 208 H844"/>
    <path d="M315 196 L327 208 L315 220"/>
    <path d="M574 196 L586 208 L574 220"/>
    <path d="M833 196 L845 208 L833 220"/>
  </g>
  <g font-family="Inter, Segoe UI, Arial, sans-serif" fill="#17324d">
    <text x="92" y="164" font-size="22" font-weight="700">Chat</text>
    <text x="92" y="198" font-size="15">Dictado o escritura</text>
    <text x="92" y="224" font-size="15">con instrucciones</text>
    <text x="92" y="250" font-size="15">de captura.</text>
    <text x="351" y="164" font-size="22" font-weight="700">JSONL</text>
    <text x="351" y="198" font-size="15">Entradas claras,</text>
    <text x="351" y="224" font-size="15">idempotentes y</text>
    <text x="351" y="250" font-size="15">validables.</text>
    <text x="610" y="164" font-size="22" font-weight="700">Importador</text>
    <text x="610" y="198" font-size="15">Valida campos,</text>
    <text x="610" y="224" font-size="15">hashes y posibles</text>
    <text x="610" y="250" font-size="15">duplicados.</text>
    <text x="869" y="164" font-size="22" font-weight="700">Archivo propio</text>
    <text x="869" y="198" font-size="15">Busqueda, filtros,</text>
    <text x="869" y="224" font-size="15">exportacion y</text>
    <text x="869" y="250" font-size="15">control de datos.</text>
  </g>
  <g fill="#276c5d">
    <circle cx="171" cy="352" r="6"/>
    <circle cx="431" cy="352" r="6"/>
    <circle cx="690" cy="352" r="6"/>
    <circle cx="950" cy="352" r="6"/>
  </g>
  <g font-family="Inter, Segoe UI, Arial, sans-serif" fill="#276c5d" font-size="14" font-weight="700">
    <text x="121" y="383">captura facil</text>
    <text x="377" y="383">contrato estable</text>
    <text x="634" y="383">seguridad local</text>
    <text x="902" y="383">salida abierta</text>
  </g>
</svg>
